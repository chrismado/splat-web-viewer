<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splat Web Viewer Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    #canvas { cursor: grab; touch-action: none; }
    #canvas.dragging { cursor: grabbing; }
    #overlay {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
      font-size: 13px; line-height: 1.5; pointer-events: none;
    }
    #overlay.hidden { display: none; }
    #controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    #controls button {
      background: #333; border: 1px solid #555; color: #eee;
      padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #controls button:hover { background: #444; }
    #file-input { display: none; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

    <div id="overlay">
      <div>Splat Web Viewer</div>
      <div id="stats">No file loaded</div>
      <div>Drag to orbit · Wheel to zoom</div>
      <div id="fps"></div>
    </div>

  <div id="controls">
    <button id="btn-load" onclick="document.getElementById('file-input').click()">
      Load .spz
    </button>
    <button id="btn-sample">Load Sample Scene</button>
    <button id="btn-export">Export glTF</button>
    <button id="btn-stream">Connect Stream</button>
    <button id="btn-info" onclick="document.getElementById('overlay').classList.toggle('hidden')">
      Toggle Info
    </button>
  </div>

  <input type="file" id="file-input" accept=".spz">

  <script type="module">
    import { decodeSPZ, WebGPURasterizer, WebGLFallbackRenderer, WebRTCSplatClient, exportToGLTF } from "../dist/splat-viewer.js";

    const canvas = document.getElementById("canvas");
    const statsEl = document.getElementById("stats");
    const fpsEl = document.getElementById("fps");

    let renderer = null;
    let splats = [];
    let useWebGPU = !!navigator.gpu;
    let yaw = 0;
    let pitch = 0.18;
    let distance = 5;
    let dragging = false;
    let lastPointerX = 0;
    let lastPointerY = 0;

    // Camera state
    const camera = {
      viewMatrix: new Float32Array(16),
      projMatrix: new Float32Array(16),
      position: new Float32Array([0, 0, 5]),
      focalX: canvas.width * 0.8,
      focalY: canvas.height * 0.8,
    };

    function resizeCanvas() {
      canvas.width = Math.floor(window.innerWidth * devicePixelRatio);
      canvas.height = Math.floor(window.innerHeight * devicePixelRatio);
      camera.focalX = canvas.width * 0.8;
      camera.focalY = canvas.height * 0.8;
      camera.projMatrix.set([
        2 * camera.focalX / canvas.width, 0, 0, 0,
        0, 2 * camera.focalY / canvas.height, 0, 0,
        0, 0, -1.002, -1,
        0, 0, -0.2002, 0
      ]);
    }

    function normalize(v) {
      const len = Math.hypot(v[0], v[1], v[2]) || 1;
      return [v[0] / len, v[1] / len, v[2] / len];
    }

    function cross(a, b) {
      return [
        a[1] * b[2] - a[2] * b[1],
        a[2] * b[0] - a[0] * b[2],
        a[0] * b[1] - a[1] * b[0],
      ];
    }

    function dot(a, b) {
      return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
    }

    function updateCameraView() {
      const eye = [
        distance * Math.sin(yaw) * Math.cos(pitch),
        distance * Math.sin(pitch),
        distance * Math.cos(yaw) * Math.cos(pitch),
      ];
      const target = [0, 0, 0];
      const up = [0, 1, 0];
      const zAxis = normalize([eye[0] - target[0], eye[1] - target[1], eye[2] - target[2]]);
      const xAxis = normalize(cross(up, zAxis));
      const yAxis = cross(zAxis, xAxis);

      camera.position.set(eye);
      camera.viewMatrix.set([
        xAxis[0], yAxis[0], zAxis[0], 0,
        xAxis[1], yAxis[1], zAxis[1], 0,
        xAxis[2], yAxis[2], zAxis[2], 0,
        -dot(xAxis, eye), -dot(yAxis, eye), -dot(zAxis, eye), 1,
      ]);
    }

    updateCameraView();
    resizeCanvas();

    function makeSplat(x, y, z, color, scale = 0.28, alpha = 0.72) {
      return {
        position: new Float32Array([x, y, z]),
        alpha,
        color: new Float32Array(color),
        scale: new Float32Array([scale, scale, scale]),
        rotation: new Float32Array([1, 0, 0, 0]),
        sphericalHarmonics: new Float32Array(0),
      };
    }

    function loadSampleScene() {
      splats = [
        makeSplat(-0.9, -0.35, 0, [0.95, 0.38, 0.22]),
        makeSplat(-0.35, 0.35, 0.15, [0.95, 0.72, 0.28]),
        makeSplat(0.25, -0.2, -0.05, [0.25, 0.70, 0.95]),
        makeSplat(0.8, 0.28, 0.1, [0.65, 0.86, 0.45]),
        makeSplat(0.05, 0.05, 0.45, [0.95, 0.95, 0.98], 0.18, 0.55),
      ];
      renderer.uploadSplats(splats);
      statsEl.textContent = `Sample scene: ${splats.length} splats`;
    }

    async function initRenderer() {
      if (useWebGPU) {
        try {
          renderer = new WebGPURasterizer(canvas);
          await renderer.initialize();
          statsEl.textContent = "Renderer: WebGPU";
        } catch (e) {
          console.warn("WebGPU init failed, falling back to WebGL:", e);
          useWebGPU = false;
        }
      }
      if (!useWebGPU) {
        renderer = new WebGLFallbackRenderer(canvas);
        renderer.initialize();
        statsEl.textContent = "Renderer: WebGL 2 (fallback)";
      }
      loadSampleScene();
    }

    // Load .spz file
    document.getElementById("file-input").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      statsEl.textContent = `Loading ${file.name}...`;
      const buffer = await file.arrayBuffer();
      splats = await decodeSPZ(buffer);
      renderer.uploadSplats(splats);
      statsEl.textContent = `${splats.length.toLocaleString()} splats (${(buffer.byteLength / 1024 / 1024).toFixed(1)} MB)`;
    });

    document.getElementById("btn-sample").addEventListener("click", loadSampleScene);

    canvas.addEventListener("pointerdown", (event) => {
      dragging = true;
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const dx = event.clientX - lastPointerX;
      const dy = event.clientY - lastPointerY;
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      yaw -= dx * 0.006;
      pitch = Math.max(-1.2, Math.min(1.2, pitch + dy * 0.006));
      updateCameraView();
    });

    function stopDrag(event) {
      dragging = false;
      canvas.classList.remove("dragging");
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener("pointerup", stopDrag);
    canvas.addEventListener("pointercancel", stopDrag);

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      distance = Math.max(1.8, Math.min(12, distance * Math.exp(event.deltaY * 0.001)));
      updateCameraView();
    }, { passive: false });

    // Export glTF
    document.getElementById("btn-export").addEventListener("click", () => {
      if (splats.length === 0) { alert("No splats loaded"); return; }
      const json = exportToGLTF(splats);
      const blob = new Blob([json], { type: "model/gltf+json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "splats.gltf";
      a.click();
      URL.revokeObjectURL(url);
    });

    // WebRTC streaming
    document.getElementById("btn-stream").addEventListener("click", async () => {
      const serverUrl = prompt("WebRTC server URL:", "http://localhost:8081");
      if (!serverUrl) return;
      const client = new WebRTCSplatClient(serverUrl);
      client.onDeltaReceived((delta) => {
        if (renderer && renderer.updateColors) {
          renderer.updateColors(delta);
        }
      });
      await client.connect();
      statsEl.textContent += " | Streaming";
    });

    // Render loop
    let lastTime = performance.now();
    let frameCount = 0;

    function frame() {
      requestAnimationFrame(frame);
      if (renderer && splats.length > 0) {
        renderer.render(camera);
      }

      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `${frameCount} FPS`;
        frameCount = 0;
        lastTime = now;
      }
    }

    initRenderer().then(frame);

    // Resize handling
    window.addEventListener("resize", () => {
      resizeCanvas();
    });
  </script>
</body>
</html>
