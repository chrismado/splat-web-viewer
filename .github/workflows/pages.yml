name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/dist _site/shaders
          cp demo/index.html _site/index.html
          cp dist/splat-viewer.js _site/dist/
          cp dist/splat-viewer.js.map _site/dist/ 2>/dev/null || true
          cp shaders/mip_splatting.wgsl _site/shaders/
          # Fix import path — demo/index.html references ../dist/ but _site is flat
          sed -i 's|\.\./dist/|./dist/|g' _site/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5.0.0

      - id: deployment
        uses: actions/deploy-pages@v5
